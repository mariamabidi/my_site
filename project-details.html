<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Details | Mariam Abidi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-main">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="index.html"><i class="fas fa-arrow-left me-2"></i> Back to Portfolio</a>
  </div>
</nav>

<section class="py-5 mt-5 project-detail-section min-vh-100">
  <div class="container py-4">

    <div class="row mb-5 text-center">
      <div class="col-12">
          <h1 id="proj-title" class="fw-bold mb-3">Loading Project...</h1>
          <p id="proj-subtitle" class="lead text-muted"></p>

          <div class="d-flex justify-content-center gap-3 mt-2">
              <a id="proj-github" href="#" target="_blank" class="btn btn-outline-info">
                  <i class="fab fa-github me-2"></i>View Source Code
              </a>
              <a id="proj-report" href="#" target="_blank" class="btn btn-outline-info">
                  <i class="fas fa-file-pdf me-2"></i>Detailed Report
              </a>
          </div>
      </div>
    </div>

    <div class="row mb-5">
      <div class="col-md-10 mx-auto">
        <h3 class="border-bottom border-secondary pb-2 mb-4">
          <i class="fas fa-microchip text-primary me-2"></i>Technologies Used
        </h3>
        <div id="proj-tech-stack" class="d-flex flex-wrap gap-2">
          </div>
      </div>
    </div>

    <div class="row mb-5">
      <div class="col-md-10 mx-auto">
        <h3 class="border-bottom border-secondary pb-2 mb-4">
          <i class="fas fa-sitemap text-primary me-2"></i>System Structure & Architecture
        </h3>
        <p id="proj-structure" class="text-muted"></p>

        <div id="proj-diagram" class="text-center my-4 d-none">
            <img id="proj-img" src="" class="img-fluid rounded shadow-lg border border-secondary" alt="Architecture Diagram">
        </div>
      </div>
    </div>

    <div class="row mb-5">
      <div class="col-md-10 mx-auto">
        <h3 class="border-bottom border-secondary pb-2 mb-4">
          <i class="fas fa-chart-line text-primary me-2"></i>Evaluations & Results
        </h3>
        <div id="proj-evaluation">
           </div>
      </div>
    </div>
  </div>
</section>

<footer class="text-center py-3 bg-dark text-muted">
  © 2025 Mariam Abidi
</footer>

<script src="projects.js"></script>
</body>
</html>
